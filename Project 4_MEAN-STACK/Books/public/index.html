```html
<!DOCTYPE html>
<html lang="en" ng-app="bookApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="script.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body ng-controller="BookController">

    <h1>Book Management</h1>

    <h2>Add New Book</h2>

    <form ng-submit="addBook()">
        <table>
            <tr>
                <td>Name</td>
                <td>
                    <input type="text"
                           ng-model="newBook.name"
                           required>
                </td>
            </tr>

            <tr>
                <td>ISBN</td>
                <td>
                    <input type="text"
                           ng-model="newBook.isbn"
                           required>
                </td>
            </tr>

            <tr>
                <td>Author</td>
                <td>
                    <input type="text"
                           ng-model="newBook.author"
                           required>
                </td>
            </tr>

            <tr>
                <td>Pages</td>
                <td>
                    <input type="number"
                           ng-model="newBook.pages"
                           min="1"
                           required>
                </td>
            </tr>
        </table>

        <button type="submit">Add Book</button>
    </form>

    <h2>Book List</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>ISBN</th>
                <th>Author</th>
                <th>Pages</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr ng-repeat="book in books">
                <td>{{ book.name }}</td>
                <td>{{ book.isbn }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.pages }}</td>
                <td>
                    <button ng-click="deleteBook(book)">
                        Delete
                    </button>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
```
